<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RYVOX Tb - Full Screen IPTV</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <!-- Full Screen Video Container -->
    <div class="video-container">
        <video id="videoPlayer" playsinline></video>
        <div id="loader" class="loader"></div>
    </div>

    <!-- Channel List - Left Side -->
    <div id="channelList" class="channel-list">
        <div class="channel-header">
            <h2>
                <i class="fas fa-tv"></i>
                TV CHANNELS
            </h2>
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search channel...">
        </div>
        <div id="channelsContainer"></div>
        <div class="close-list" id="closeListBtn">
            <i class="fas fa-times"></i>
        </div>
    </div>

    <!-- Volume Control - Will show/hide with channel list -->
    <div id="volumeControl" class="volume-control">
        <button id="volumeBtn" class="volume-btn">
            <i class="fas fa-volume-up"></i>
        </button>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" class="volume-slider">
    </div>

    <!-- Toggle Button for Mobile -->
    <button id="toggleListBtn" class="toggle-list-btn">
        <i class="fas fa-list-ul"></i>
    </button>

    <!-- Current Channel Info -->
    <div class="channel-info-bar" id="channelInfoBar">
        <span id="currentChannelName">Select Channel</span>
        <span class="live-badge">● LIVE</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
