<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RYVOX TV - Desktop Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="ui-visible">

    <div class="video-container">
        <video id="videoPlayer" crossorigin="anonymous"></video>
        
        <!-- Premium Neon Loader -->
        <div id="loadingMessage" class="loading-overlay">
            <div class="loader-content">
                <div class="neon-spinner">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                </div>
                <p id="loadingText">📡 CONNECTING TO STREAM...</p>
            </div>
        </div>
    </div>

    <div id="uiWrapper">
        <aside id="channelList" class="channel-sidebar">
            <div class="sidebar-header">
                <div class="brand"><i class="fas fa-broadcast-tower"></i> RYVOX TV</div>
                <input type="text" id="searchInput" class="search-input" placeholder="Search Channels...">
            </div>
            <div id="channelsContainer" class="channels-grid"></div>
        </aside>

        <div class="player-controls">
            <button id="volumeBtn" class="icon-btn"><i class="fas fa-volume-up"></i></button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" class="slider">
            <button id="fullscreenBtn" class="icon-btn"><i class="fas fa-expand"></i></button>
        </div>
    </div>

    <div class="logo-container">
        <div class="ryvox-logo">
            <span class="logo-text">RYVOX</span>
            <span class="logo-sub">TV</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
