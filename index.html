<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RYVOX Tb - Premium IPTV Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <!-- Full Screen Video Container -->
    <div class="video-container">
        <video id="videoPlayer" playsinline></video>
        
        <!-- Loading Message -->
        <div id="loadingMessage" class="loading-message">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p id="loadingText">Loading channel...</p>
            </div>
        </div>
    </div>

    <!-- Channel List - Left Side -->
    <div id="channelList" class="channel-list active">
        <div class="channel-header">
            <h2>
                <i class="fas fa-tv"></i>
                TV CHANNELS
            </h2>
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search channel...">
        </div>
        <div id="channelsContainer"></div>
        <div class="close-list" id="closeListBtn">
            <i class="fas fa-times"></i>
        </div>
    </div>

    <!-- Control Panel -->
    <div id="controlPanel" class="control-panel">
        <div class="control-buttons">
            <button id="volumeBtn" class="control-btn">
                <i class="fas fa-volume-up"></i>
            </button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" class="volume-slider">
            <button id="fullscreenBtn" class="control-btn">
                <i class="fas fa-expand"></i>
            </button>
        </div>
    </div>

    <!-- Toggle Button for Mobile -->
    <button id="toggleListBtn" class="toggle-list-btn">
        <i class="fas fa-list-ul"></i>
    </button>

    <!-- Company Logo with Animation -->
    <div class="company-logo">
        <div class="logo-text">
            <span class="logo-main">RYVOX</span>
            <span class="logo-sub">Tb</span>
        </div>
        <div class="logo-animation"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
