<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RYVOX Tb - Ultra Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="ui-visible">

    <!-- ভিডিও কন্টেইনার -->
    <div class="video-container" id="videoBox">
        <video id="videoPlayer" playsinline crossorigin="anonymous"></video>
        
        <!-- প্রিমিয়াম লোডার -->
        <div id="loadingMessage" class="loading-overlay">
            <div class="loader-content">
                <div class="glow-spinner"></div>
                <p id="loadingText">চ্যানেল প্রসেসিং হচ্ছে...</p>
            </div>
        </div>
    </div>

    <!-- ব্র্যান্ড লোগো (সবসময় দৃশ্যমান + প্রিমিয়াম এনিমেশন) -->
    <div class="permanent-brand" id="mainLogo">
        <div class="logo-box">
            <span class="txt-main">RYVOX</span>
            <span class="txt-sub">Tb</span>
            <div class="shimmer"></div>
        </div>
    </div>

    <!-- ইউজার ইন্টারফেস (UI) যা অটো হাইড হবে -->
    <div id="uiWrapper">
        
        <!-- চ্যানেল সাইডবার -->
        <div id="channelList" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title"><i class="fas fa-play-circle"></i> লাইভ টিভি</div>
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="সার্চ করুন...">
                </div>
            </div>
            <div id="channelsContainer" class="channel-list-box"></div>
        </div>

        <!-- নিচের কন্ট্রোল প্যানেল -->
        <div class="bottom-controls">
            <div class="glass-panel">
                <button id="volumeBtn" class="ctrl-btn"><i class="fas fa-volume-up"></i></button>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" class="vol-bar">
                <button id="fullscreenBtn" class="ctrl-btn"><i class="fas fa-expand-arrows-alt"></i></button>
            </div>
        </div>

        <!-- মোবাইল মেনু টগল -->
        <button id="toggleListBtn" class="menu-toggle">
            <i class="fas fa-th-list"></i>
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
